[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_SERVICE_ROLE_KEY,STRIPE_SECRET_KEY,ADMIN_TOKEN"

# Note: scripts include 'unsafe-inline' because index.html still has inline
# event handlers. Once those are migrated to addEventListener you can drop
# 'unsafe-inline' from script-src for stronger XSS defence.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' https://www.youtube.com https://www.youtube-nocookie.com https://s.ytimg.com https://cdn.jsdelivr.net;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: https:;
      media-src 'self' blob: https:;
      connect-src 'self' https://*.supabase.co https://api.emailjs.com;
      frame-src https://www.youtube.com https://www.youtube-nocookie.com;
      base-uri 'self';
      form-action 'self';
    """

# Service worker shouldn't be cached (so a deploy can replace it)
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
